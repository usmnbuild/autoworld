<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoWorld — Login & Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{--gold:#c9a34b}

body{
background:linear-gradient(180deg,#070708,#0f0f10);
color:#eee;
font-family:"Segoe UI",Arial;
padding-top:90px
}

/* NAVBAR */
.navbar{background:#000}
.navbar-brand img{height:65px}
.nav-link{color:#ccc!important}
.nav-link:hover,.nav-link.active{color:var(--gold)!important}

/* AUTH BOX */
.auth-box{
max-width:450px;
margin:auto;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:35px;
backdrop-filter:blur(6px);
box-shadow:0 25px 50px rgba(0,0,0,.5)
}

/* TABS */
.nav-tabs{border:none}
.nav-tabs .nav-link{
color:#bbb;
border:none;
font-weight:600
}
.nav-tabs .nav-link.active{
background:none;
color:var(--gold);
border-bottom:2px solid var(--gold)
}

/* INPUTS */
.form-control{
background:#111;
border:1px solid rgba(255,255,255,.15);
color:#fff
}
.form-control:focus{
border-color:var(--gold);
box-shadow:none
}

/* BUTTON */
.btn-gold{
background:var(--gold);
color:#000;
font-weight:600;
border:none;
border-radius:12px
}
.btn-gold:hover{background:#ddb962}

/* PASSWORD EYE */
.eye-icon{
position:absolute;
right:15px;
top:65%;
transform:translateY(-50%);
cursor:pointer;
color:#aaa
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">
<div class="container">
<a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
<img src="logo autoworld.png">
<strong>AutoWorld</strong>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="catalog.html">Catalogue</a></li>
<li class="nav-item"><a class="nav-link" href="compare.html">Compare</a></li>
<li class="nav-item"><a class="nav-link" href="dealers.html">Dealers</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
<li class="nav-item"><a class="nav-link" href="warrenty.html">Contact</a></li>
<li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
</ul>
</div>
</div>
</nav>

<!-- AUTH -->
<div class="auth-box mt-4" data-aos="zoom-in">

<ul class="nav nav-tabs justify-content-center mb-4">
<li class="nav-item">
<a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Login</a>
</li>
<li class="nav-item">
<a class="nav-link" data-bs-toggle="tab" href="#registerTab">Register</a>
</li>
</ul>

<div class="tab-content">

<!-- LOGIN -->
<div class="tab-pane fade show active" id="loginTab">
<form id="loginForm">
<div class="mb-3">
<label>Email</label>
<input type="email" id="loginEmail" class="form-control" required>
</div>

<div class="mb-3 position-relative">
<label>Password</label>
<input type="password" id="loginPassword" class="form-control" required>
<i class="fa fa-eye eye-icon" onclick="togglePassword('loginPassword',this)"></i>
</div>

<button class="btn btn-gold w-100">Login</button>
</form>
</div>

<!-- REGISTER -->
<div class="tab-pane fade" id="registerTab">
<form id="registerForm">
<div class="mb-3">
<label>Full Name</label>
<input type="text" id="regName" class="form-control" required pattern="[A-Za-z\s]+" title="Only letters allowed">

</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="regEmail" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="tel" id="regPhone" class="form-control" maxlength="11" required>
</div>

<div class="mb-3 position-relative">
<label>Password</label>
<input type="password" id="regPassword" class="form-control" required>
<i class="fa fa-eye eye-icon" onclick="togglePassword('regPassword',this)"></i>
</div>

<div class="mb-3 position-relative">
<label>Confirm Password</label>
<input type="password" id="regConfirm" class="form-control" required>
<i class="fa fa-eye eye-icon" onclick="togglePassword('regConfirm',this)"></i>
</div>

<button class="btn btn-gold w-100">Create Account</button>
</form>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({ duration: 900, once: true });

/* PASSWORD TOGGLE */
function togglePassword(id, icon) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

/* ======================
   REGISTER USER
====================== */
registerForm.onsubmit = e => {
  e.preventDefault();

  const name = regName.value.trim();
  const email = regEmail.value.trim();
  const phone = regPhone.value.trim();
  const password = regPassword.value;
  const confirm = regConfirm.value;

  // Name validation
  if (!/^[A-Za-z\s]+$/.test(name)) {
    alert("Name should contain only letters");
    return;
  }

  if (password !== confirm) {
    alert("Passwords do not match");
    return;
  }

  const user = {
    name,
    email,
    phone,
    password
  };

  localStorage.setItem("userData", JSON.stringify(user));
  alert("Account Created Successfully!");
  registerForm.reset();
};

/* ======================
   LOGIN USER
====================== */
loginForm.onsubmit = e => {
  e.preventDefault();

  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  const storedUser = JSON.parse(localStorage.getItem("userData"));

  if (!storedUser) {
    alert("No account found. Please register first.");
    return;
  }

  if (email === storedUser.email && password === storedUser.password) {
    alert("Login Successful!");
  } else {
    alert("Invalid Email or Password");
  }
};
</script>



</body>
</html>
